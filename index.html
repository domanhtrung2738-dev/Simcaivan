<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sim Cải Vận - Phân tích phong thủy số điện thoại theo Kinh Dịch và Bát Cực Linh Số">
  <title>Sim Cải Vận — Phong Thủy Sim</title>
  <meta name="theme-color" content="#0a0a1a">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☰</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/vvip.css">
  
  <!-- Supabase CDN (Load in head to ensure window.supabase is ready) -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header__logo">
        <img src="assets/logo.png" alt="Sim Cải Vận Logo" class="logo-img">
      </div>
      <h1 class="header__title">Sim Cải Vận</h1>
      <p class="header__subtitle">Phân tích phong thủy sim theo Kinh Dịch & Bát Cực Linh Số</p>
    </header>

    <!-- Tabs -->
    <nav class="tabs" role="tablist">
      <button class="tab-btn active" data-tab="tab-single" role="tab" id="tab-btn-single">
        <span class="tab-btn__icon">🔍</span>
        <span>Kiểm tra sim</span>
      </button>
      <button class="tab-btn" data-tab="tab-batch" role="tab" id="tab-btn-batch">
        <span class="tab-btn__icon">📋</span>
        <span>Lọc sim theo list</span>
      </button>
      <button class="tab-btn" data-tab="tab-book" role="tab" id="tab-btn-book">
        <span class="tab-btn__icon">📖</span>
        <span>Sách Tra Cứu</span>
      </button>
      <button class="tab-btn" data-tab="tab-vvip" role="tab" id="tab-btn-vvip">
        <span class="tab-btn__icon">💎</span>
        <span>Kho Sim VVIP</span>
      </button>
    </nav>

    <!-- Tab: Single Analysis -->
    <section class="tab-content active" id="tab-single" role="tabpanel">
      <div class="input-section">
        <div class="input-group">
          <label for="input-single">Nhập số điện thoại</label>
          <div class="input-with-btn">
            <input
              type="text"
              id="input-single"
              class="input-phone"
              placeholder="VD: 0987.654.321"
              autocomplete="off"
              maxlength="20"
            >
            <button class="btn-analyze" id="btn-single">Phân tích</button>
          </div>
        </div>

        <div class="personal-inputs">
          <div class="input-group">
            <label for="input-year">Năm Sinh</label>
            <input type="number" id="input-year" class="input-personal" placeholder="VD: 1990" min="1900" max="2100">
          </div>
          <div class="input-group">
            <label for="input-gender">Giới Tính</label>
            <select id="input-gender" class="input-personal">
              <option value="male">Nam</option>
              <option value="female">Nữ</option>
            </select>
          </div>
          <div class="input-group">
            <label for="input-cccd">CCCD / CMND (Tùy chọn)</label>
            <input type="text" id="input-cccd" class="input-personal" placeholder="12 chữ số" maxlength="12">
          </div>
        </div>
      </div>

      <div id="result-single">
        <div class="empty-state">
          <div class="empty-state__icon">☰</div>
          <div class="empty-state__text">Nhập số điện thoại để xem phong thủy</div>
        </div>
      </div>
    </section>

    <!-- Tab: Batch Analysis -->
    <section class="tab-content" id="tab-batch" role="tabpanel">
      <div class="input-section">
        <div class="input-group">
          <label for="input-batch">Nhập danh sách số sim</label>
          <textarea
            id="input-batch"
            class="input-batch"
            placeholder="Mỗi dòng 1 số, có thể thêm giá và nhà mạng cách bởi dấu |&#10;VD:&#10;0987654321&#10;0912345678 | 500000 | Viettel&#10;0368888999 | 1200000"
          ></textarea>
        </div>
        <div class="batch-actions">
          <span class="batch-hint">💡 Hỗ trợ format: số | giá | nhà mạng</span>
          <button class="btn-analyze" id="btn-batch" style="position:static;transform:none;width:auto">
            Phân tích tất cả
          </button>
        </div>
      </div>

      <div id="result-batch">
        <div class="empty-state">
          <div class="empty-state__icon">📋</div>
          <div class="empty-state__text">Nhập danh sách số sim để phân tích hàng loạt</div>
        </div>
      </div>
    </section>

    <!-- Tab: VVIP List -->
    <section class="tab-content" id="tab-vvip" role="tabpanel">
      <div class="vvip-header">
        <div class="vvip-header__title">
          <span>💎</span> Kho Số Đẹp VVIP
        </div>
        <div class="vvip-filters">
          <input type="text" id="vvip-search-input" class="input-personal vvip-search-box" placeholder="🔍 Tìm đầu số...">
          <select id="vvip-filter-carrier" class="input-personal vvip-select-box">
            <option value="">Tất cả mạng</option>
            <option value="Viettel">Viettel</option>
            <option value="Vinaphone">Vinaphone</option>
            <option value="Mobifone">Mobifone</option>
            <option value="Wintel">Wintel</option>
          </select>
        </div>
      </div>
      
      <div id="vvip-container" class="vvip-container">
        <div class="empty-state">
           <div class="empty-state__icon">⏳</div>
           <div class="empty-state__text">Đang tải danh sách sim...</div>
        </div>
      </div>
    </section>

    <!-- Tab: Knowledge Book -->
    <section class="tab-content" id="tab-book" role="tabpanel">
      <!-- Search bar -->
      <div class="book-search-container">
        <input type="text" id="book-search-input" class="book-search" placeholder="🔍 Tìm quẻ, từ trường, bát quái...">
      </div>
      
      <!-- Container render JS -->
      <div id="book-container" class="book-container"></div>
    </section>
  </div>

  <!-- Scripts: data → modules → renderers → controller → book -->
  <script src="js/queDich-data.js"></script>
  <script src="js/core-parse.js"></script>
  <script src="js/tu-truong.js"></script>
  <script src="js/que-dich.js"></script>
  <script src="js/personal-fit.js"></script>
  <script src="js/analysis-core.js"></script>
  <script src="js/ui-renderers.js"></script>
  <script src="js/app-controller.js"></script>
  <script src="js/book-loader.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/vvip-controller.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(error => {
          console.log('SW Registration failed: ', error);
        });
      });
    }
  </script>
</body>
</html>
